name: Code Review

on:
  push:
    branches: [ main, develop, rebuild ]
  pull_request:
    branches: [ main, develop, rebuild ]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y xmlstarlet libxml2-utils bats

      - name: Install npm dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Launcher tests (bats)
        run: npm run test:launcher

      - name: Lint (JSHint)
        run: npm run lint

      - name: Run code review script
        run: |
          chmod +x scripts/code-review.sh
          ./scripts/code-review.sh
